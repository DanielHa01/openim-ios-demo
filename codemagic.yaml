workflows:
  inspect-repo:
    name: Inspect Repository

    instance_type: mac_mini_m2

    environment:
      xcode: latest

    scripts:
      - name: Show repository structure
        script: |
          pwd

          echo "=== XCODE PROJECTS ==="
          find . -name "*.xcodeproj"

          echo "=== XCODE WORKSPACES ==="
          find . -name "*.xcworkspace"

          echo "=== PODFILES ==="
          find . -name "Podfile"

          echo "=== PACKAGE.SWIFT ==="
          find . -name "Package.swift"

          echo "=== TOP LEVEL ==="
          ls -la

          echo "=== FIRST 3 LEVELS ==="
          find . -maxdepth 3 -type d

    artifacts:
      - "**/*"
